frr defaults datacenter
hostname SP2
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.255.0.2/32
!
interface eth0
 description to-Leaf1-eth1
 ip address 10.0.5.1/30
!
interface eth1
 description to-Leaf2-eth1
 ip address 10.0.6.1/30
!
interface eth2
 description to-Leaf3-eth1
 ip address 10.0.7.1/30
!
interface eth3
 description to-Leaf4-eth1
 ip address 10.0.8.1/30
!
interface eth4
 description to-Border-Leaf-eth1
 ip address 10.0.10.1/30
!
router bgp 65000
 bgp router-id 10.255.0.2
 bgp bestpath as-path multipath-relax
 no bgp default ipv4-unicast
 !
 neighbor LEAVES peer-group
 neighbor LEAVES remote-as external
 neighbor LEAVES bfd
 neighbor LEAVES capability extended-nexthop
 neighbor LEAVES soft-reconfiguration inbound
 !
 neighbor 10.0.5.2 peer-group LEAVES
 neighbor 10.0.5.2 description Leaf1
 neighbor 10.0.6.2 peer-group LEAVES
 neighbor 10.0.6.2 description Leaf2
 neighbor 10.0.7.2 peer-group LEAVES
 neighbor 10.0.7.2 description Leaf3
 neighbor 10.0.8.2 peer-group LEAVES
 neighbor 10.0.8.2 description Leaf4
 neighbor 10.0.10.2 peer-group LEAVES
 neighbor 10.0.10.2 description Border-Leaf
 !
 address-family ipv4 unicast
  network 10.255.0.2/32
  neighbor LEAVES activate
  neighbor LEAVES next-hop-self
  neighbor LEAVES soft-reconfiguration inbound
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor LEAVES activate
 exit-address-family
!
