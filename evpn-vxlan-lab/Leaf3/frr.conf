frr defaults datacenter
hostname Leaf3
log syslog informational
service integrated-vtysh-config
!
vrf vrf-tenA
 vni 50010
exit-vrf
vrf vrf-tenB
 vni 50020
exit-vrf
!
interface lo
 ip address 10.255.1.3/32
!
interface eth0
 description to-SP1-eth2
 ip address 10.0.3.2/30
!
interface eth1
 description to-SP2-eth2
 ip address 10.0.7.2/30
!
interface eth2
 description MLAG-peer-to-Leaf4
 ip address 10.0.21.1/30
!
interface eth3
 description to-SW2-Ethernet0/0
!
router bgp 65003
 bgp router-id 10.255.1.3
 bgp bestpath as-path multipath-relax
 no bgp default ipv4-unicast
 !
 neighbor SPINES peer-group
 neighbor SPINES remote-as external
 neighbor SPINES bfd
 neighbor SPINES capability extended-nexthop
 neighbor SPINES soft-reconfiguration inbound
 !
 neighbor 10.0.3.1 peer-group SPINES
 neighbor 10.0.3.1 description SP1
 neighbor 10.0.7.1 peer-group SPINES
 neighbor 10.0.7.1 description SP2
 !
 address-family ipv4 unicast
  neighbor SPINES activate
  network 10.255.1.3/32
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor SPINES activate
  advertise-all-vni
  advertise-svi-ip
 exit-address-family
!
router bgp 65003 vrf vrf-tenA
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
 exit-address-family
!
router bgp 65003 vrf vrf-tenB
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
 exit-address-family
!
