! SW1 - Access Layer Switch Pod-1
! Cisco IOSv L2 (i86bi-linux-l2)
! Apply in enable mode: configure terminal → paste → end → write memory

hostname SW1

vtp mode transparent

vlan 10
 name Tenant-A-VLAN10
vlan 20
 name Tenant-A-VLAN20

! Disable STP on tenant VLANs - fabric handles loop prevention
no spanning-tree vlan 10
no spanning-tree vlan 20
spanning-tree mode rapid-pvst

! Port-channel toward Leaf1 and Leaf2 (MLAG uplink)
interface Port-channel1
 description MLAG-uplink-to-Leaf1-and-Leaf2
 switchport trunk encapsulation dot1q
 switchport trunk allowed vlan 10,20
 switchport mode trunk

! Ethernet0/0 → Leaf1 eth3
interface Ethernet0/0
 description to-Leaf1-eth3
 switchport trunk encapsulation dot1q
 switchport trunk allowed vlan 10,20
 switchport mode trunk
 duplex auto
 channel-group 1 mode active
 no shutdown

! Ethernet0/1 → Leaf2 eth3
interface Ethernet0/1
 description to-Leaf2-eth3
 switchport trunk encapsulation dot1q
 switchport trunk allowed vlan 10,20
 switchport mode trunk
 duplex auto
 channel-group 1 mode active
 no shutdown

! Ethernet0/2 → Ubuntu-H1 (VLAN 10 access)
interface Ethernet0/2
 description to-Ubuntu-H1
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown

! Ethernet0/3 → Ubuntu-H2 (VLAN 20 access)
interface Ethernet0/3
 description to-Ubuntu-H2
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 no shutdown

! Shutdown all unused interfaces
interface range Ethernet1/0 - 3
 shutdown
interface range Ethernet2/0 - 3
 shutdown
interface range Ethernet3/0 - 3
 shutdown
