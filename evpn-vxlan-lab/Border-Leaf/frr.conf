frr defaults datacenter
hostname Border-Leaf
log syslog informational
service integrated-vtysh-config
!
vrf vrf-tenA
 vni 50010
exit-vrf
vrf vrf-tenB
 vni 50020
exit-vrf
!
interface lo
 ip address 10.255.1.5/32
!
interface eth0
 description to-SP1-eth4
 ip address 10.0.9.2/30
!
interface eth1
 description to-SP2-eth4
 ip address 10.0.10.2/30
!
interface eth2
 description to-CE-Switch-Ethernet0/0
 ip address 10.0.11.1/30
!
router bgp 65005
 bgp router-id 10.255.1.5
 bgp bestpath as-path multipath-relax
 no bgp default ipv4-unicast
 !
 neighbor SPINES peer-group
 neighbor SPINES remote-as external
 neighbor SPINES bfd
 neighbor SPINES capability extended-nexthop
 neighbor SPINES soft-reconfiguration inbound
 !
 neighbor 10.0.9.1 peer-group SPINES
 neighbor 10.0.9.1 description SP1
 neighbor 10.0.10.1 peer-group SPINES
 neighbor 10.0.10.1 description SP2
 !
 neighbor 10.0.11.2 remote-as 65100
 neighbor 10.0.11.2 description CE-Switch
 neighbor 10.0.11.2 soft-reconfiguration inbound
 !
 address-family ipv4 unicast
  network 10.255.1.5/32
  neighbor SPINES activate
  neighbor SPINES next-hop-self
  neighbor 10.0.11.2 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor SPINES activate
  advertise-all-vni
  advertise ipv4 unicast
 exit-address-family
!
router bgp 65005 vrf vrf-tenA
 address-family ipv4 unicast
  redistribute connected
  import vrf default
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
 exit-address-family
!
router bgp 65005 vrf vrf-tenB
 address-family ipv4 unicast
  redistribute connected
  import vrf default
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
 exit-address-family
!
