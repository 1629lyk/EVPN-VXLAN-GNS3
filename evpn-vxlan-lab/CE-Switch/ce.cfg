! CE-Switch — WAN simulation / external BGP peering
! Cisco IOSv L3 (i86bi-linux-l3-jk9s-15.0.1)
! IMPORTANT: run 'no switchport' before ip address on every interface
! Apply in enable mode: configure terminal → paste → end → write memory

hostname CE-Switch

ip routing

interface Loopback0
 description Simulated-WAN-prefix
 ip address 172.16.0.1 255.255.255.255
 no shutdown

interface Ethernet0/0
 description to-Border-Leaf-eth2
 no switchport
 ip address 10.0.11.2 255.255.255.252
 no shutdown

interface Ethernet0/1
 description to-NAT-Cloud-VMnet8
 no switchport
 ip address dhcp
 no shutdown

! Static null route — required for BGP to originate 172.16.0.0/16
ip route 172.16.0.0 255.255.0.0 Null0

! Return routes to tenant subnets via Border-Leaf
ip route 10.10.1.0 255.255.255.0 10.0.11.1
ip route 10.10.2.0 255.255.255.0 10.0.11.1
ip route 10.20.1.0 255.255.255.0 10.0.11.1
ip route 10.20.2.0 255.255.255.0 10.0.11.1

router bgp 65100
 bgp router-id 172.16.0.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.0.11.1 remote-as 65005
 neighbor 10.0.11.1 description Border-Leaf
 !
 address-family ipv4 unicast
  neighbor 10.0.11.1 activate
  neighbor 10.0.11.1 soft-reconfiguration inbound
  network 172.16.0.0 mask 255.255.0.0
  network 192.168.254.0 mask 255.255.255.0
 exit-address-family
