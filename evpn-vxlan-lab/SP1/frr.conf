frr defaults datacenter
hostname SP1
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.255.0.1/32
!
interface eth0
 description to-Leaf1-eth0
 ip address 10.0.1.1/30
!
interface eth1
 description to-Leaf2-eth0
 ip address 10.0.2.1/30
!
interface eth2
 description to-Leaf3-eth0
 ip address 10.0.3.1/30
!
interface eth3
 description to-Leaf4-eth0
 ip address 10.0.4.1/30
!
interface eth4
 description to-Border-Leaf-eth0
 ip address 10.0.9.1/30
!
router bgp 65000
 bgp router-id 10.255.0.1
 bgp bestpath as-path multipath-relax
 no bgp default ipv4-unicast
 !
 neighbor LEAVES peer-group
 neighbor LEAVES remote-as external
 neighbor LEAVES bfd
 neighbor LEAVES capability extended-nexthop
 neighbor LEAVES soft-reconfiguration inbound
 !
 neighbor 10.0.1.2 peer-group LEAVES
 neighbor 10.0.1.2 description Leaf1
 neighbor 10.0.2.2 peer-group LEAVES
 neighbor 10.0.2.2 description Leaf2
 neighbor 10.0.3.2 peer-group LEAVES
 neighbor 10.0.3.2 description Leaf3
 neighbor 10.0.4.2 peer-group LEAVES
 neighbor 10.0.4.2 description Leaf4
 neighbor 10.0.9.2 peer-group LEAVES
 neighbor 10.0.9.2 description Border-Leaf
 !
 address-family ipv4 unicast
  network 10.255.0.1/32
  neighbor LEAVES activate
  neighbor LEAVES next-hop-self
  neighbor LEAVES soft-reconfiguration inbound
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor LEAVES activate
 exit-address-family
!
