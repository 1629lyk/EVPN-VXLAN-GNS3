! SW2 - Access Layer Switch Pod-2
! Cisco IOSv L2 (i86bi-linux-l2)
! Apply in enable mode: configure terminal → paste → end → write memory

hostname SW2

vtp mode transparent

vlan 30
 name Tenant-B-VLAN30
vlan 40
 name Tenant-B-VLAN40

no spanning-tree vlan 30
no spanning-tree vlan 40
spanning-tree mode rapid-pvst

interface Port-channel1
 description MLAG-uplink-to-Leaf3-and-Leaf4
 switchport trunk encapsulation dot1q
 switchport trunk allowed vlan 30,40
 switchport mode trunk

interface Ethernet0/0
 description to-Leaf3-eth3
 switchport trunk encapsulation dot1q
 switchport trunk allowed vlan 30,40
 switchport mode trunk
 duplex auto
 channel-group 1 mode active
 no shutdown

interface Ethernet0/1
 description to-Leaf4-eth3
 switchport trunk encapsulation dot1q
 switchport trunk allowed vlan 30,40
 switchport mode trunk
 duplex auto
 channel-group 1 mode active
 no shutdown

interface Ethernet0/2
 description to-Ubuntu-H3
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 no shutdown

interface Ethernet0/3
 description to-Ubuntu-H4
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 no shutdown

interface range Ethernet1/0 - 3
 shutdown
interface range Ethernet2/0 - 3
 shutdown
interface range Ethernet3/0 - 3
 shutdown
